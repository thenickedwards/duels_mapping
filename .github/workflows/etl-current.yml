name: Duels Mapping ETL - MLS Current Season ETL Pipeline

# This workflow is OPT-IN and will NOT run automatically.
# You must set the ENABLE_GITHUB_ACTIONS repository variable to 'true' to activate it.
# See README.md for setup instructions.

on:
  schedule:
    # Runs 8:00 AM UTC (Sundays 1:00 AM PST / 2:00 AM PDT)
    - cron: "0 8 * * 0"
    # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  run-etl-current:
    runs-on: ubuntu-latest
    if: vars.ENABLE_GITHUB_ACTIONS == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      # For selenium_to_beautifulSoup
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Current Pipeline
        run: python app-duels-mapping/public/data/etl/pipeline_cur_FBref_misc_stats_to_schmetzer_scores_players.py
