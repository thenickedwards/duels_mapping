name: Duels Mapping ETL - SQLite to Supabase

# This workflow is OPT-IN and will NOT run automatically.
# You must set the ENABLE_GITHUB_ACTIONS repository variable to 'true' to activate it.
# See README.md for setup instructions.

on:
  schedule:
    # Runs 9:00 AM UTC (Sundays 1:00 AM PST / 2:00 AM PDT)
    - cron: "0 9 * * 0"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-supabase:
    runs-on: ubuntu-latest

    # For local testing only, must set ENABLE_GITHUB_ACTIONS to 'true' in the repo
    if: vars.ENABLE_GITHUB_ACTIONS == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SQLite to Supabase Pipeline
        run: python app-duels-mapping/public/data/etl/pipeline_SQLite_to_Supabase.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
